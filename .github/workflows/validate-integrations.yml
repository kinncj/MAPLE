name: Integration Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# These jobs validate that the agent and skill definitions are structurally
# compatible with Claude Code and OpenCode. Full LLM invocations require
# live API keys and are not run in CI.

jobs:
  # ─── Claude Code agent syntax ──────────────────────────────────────────────
  validate-claude-code:
    name: Claude Code Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Build maple
        run: |
          cp -r template tui/template
          go build -C tui -o ../maple .


      - name: Validate agent frontmatter (structural)
        run: bash tests/template/test_agents.sh

      - name: Validate claude/ directory layout
        run: |
          echo "Claude Code agents:"
          ls template/.claude/agents/
          echo "Claude Code skills:"
          ls template/.claude/skills/

      - name: Configure git identity for CI
        run: |
          git config --global user.email "maple@noreply"
          git config --global user.name "MAPLE"

      - name: Smoke-test maple init
        run: |
          mkdir -p /tmp/test-smoke
          cd /tmp/test-smoke
          MAPLE_TEMPLATE="$GITHUB_WORKSPACE/template" \
            "$GITHUB_WORKSPACE/maple" init 2>&1
          ls .claude/agents/orchestrator.md || \
            { echo "orchestrator agent missing"; exit 1; }
          ls .claude/agents/architect.md || \
            { echo "architect agent missing"; exit 1; }
          echo "Agent definitions are available to Claude Code."

  # ─── OpenCode agent syntax ─────────────────────────────────────────────────
  validate-opencode:
    name: OpenCode Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate opencode.json schema
        run: |
          python3 -c "
          import json, sys
          with open('template/opencode.json') as f:
              cfg = json.load(f)
          required = ['mcp']
          for k in required:
              assert k in cfg, f'Missing key: {k}'
          if 'model' in cfg:
              assert isinstance(cfg['model'], str), 'model must be a string (provider/model-id)'
          assert 'providers' not in cfg, 'providers is not a valid key'
          assert isinstance(cfg.get('instructions', []), list), 'instructions must be an array'
          print('opencode.json is valid.')
          "

      - name: Validate opencode/ directory layout
        run: |
          echo "OpenCode agents:"
          ls template/.opencode/agents/
          echo "OpenCode skills:"
          ls template/.opencode/skills/

  # ─── No hardcoded model names in agents ────────────────────────────────────
  audit-no-hardcoded-models:
    name: No Hardcoded Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Agents must not hardcode model names
        run: |
          # Model names like "claude-sonnet-4-5", "gpt-4o", etc. should not
          # appear in agent markdown — model selection belongs in tool config.
          FOUND=$(grep -rE \
            'claude-[a-z]+-[0-9]|gpt-[0-9]|gemini-[0-9]|llama-[0-9]' \
            template/.claude/agents/ template/.opencode/agents/ 2>/dev/null || true)
          if [[ -n "$FOUND" ]]; then
            echo "Hardcoded model names found in agents:"
            echo "$FOUND"
            exit 1
          fi
          echo "No hardcoded model names — OK."


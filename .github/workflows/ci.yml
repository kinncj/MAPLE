name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Lint shell scripts ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint maple CLI
        run: shellcheck -x scripts/maple

      - name: Lint test scripts
        run: find tests -name "*.sh" -exec shellcheck -x {} +

  # ─── Build and test the TUI ────────────────────────────────────────────────
  build-tui:
    name: Build TUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: |
          rm -f tui/template && cp -rL template tui/template
          go build -o maple ./tui

      - name: Verify binary runs
        run: ./maple --version

      - name: Cross-compile all platforms
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=amd64  go build -o dist/maple-darwin-amd64  ./tui
          GOOS=darwin  GOARCH=arm64  go build -o dist/maple-darwin-arm64  ./tui
          GOOS=linux   GOARCH=amd64  go build -o dist/maple-linux-amd64   ./tui
          GOOS=linux   GOARCH=arm64  go build -o dist/maple-linux-arm64   ./tui
          GOOS=windows GOARCH=amd64  go build -o dist/maple-windows-amd64.exe ./tui
          echo "Cross-compile OK:"
          ls -lh dist/

  # ─── CLI tests ─────────────────────────────────────────────────────────────
  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    needs: build-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build maple
        run: |
          rm -f tui/template && cp -rL template tui/template
          go build -o maple ./tui

      - name: Configure git identity
        run: |
          git config --global user.email "maple@noreply"
          git config --global user.name "MAPLE"

      - name: maple --version
        run: ./maple --version

      - name: maple --help
        run: ./maple --help

      - name: maple init (non-interactive)
        run: |
          mkdir /tmp/test-init
          MAPLE_TEMPLATE="$GITHUB_WORKSPACE/tui/template" ./maple init /tmp/test-init 2>&1 || true
          # Verify at minimum the binary runs without crashing
          ./maple --version

      - name: Run test suite
        run: bash tests/cli/test_ai_squad.sh

  # ─── Template validation ───────────────────────────────────────────────────
  validate-template:
    name: Validate Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Structure
        run: bash tests/template/test_structure.sh

      - name: Agent frontmatter
        run: bash tests/template/test_agents.sh

      - name: Skills
        run: bash tests/template/test_skills.sh

      - name: Commands
        run: bash tests/template/test_commands.sh

  # ─── CI gate ───────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, build-tui, test-cli, validate-template]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}"              != "success" ||
                "${{ needs.build-tui.result }}"         != "success" ||
                "${{ needs.test-cli.result }}"          != "success" ||
                "${{ needs.validate-template.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."


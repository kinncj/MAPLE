name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ─── Build binaries for every platform ───────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            artifact: squad-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            artifact: squad-darwin-arm64.tar.gz
          - goos: linux
            goarch: amd64
            artifact: squad-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            artifact: squad-linux-arm64.tar.gz
          - goos: windows
            goarch: amd64
            artifact: squad-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build -C tui \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "../dist/squad${EXT}" .

      - name: Archive
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip squad-windows-amd64.zip squad.exe
          else
            tar -czf squad-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz squad
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  # ─── Collect artifacts, generate checksums, publish to release ───────────────
  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/squad-darwin-amd64.tar.gz
            dist/squad-darwin-arm64.tar.gz
            dist/squad-linux-amd64.tar.gz
            dist/squad-linux-arm64.tar.gz
            dist/squad-windows-amd64.zip
            dist/checksums.txt

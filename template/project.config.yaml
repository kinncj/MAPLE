# yaml-language-server: $schema=.claude/schemas/project.config.schema.json

# ──────────────────────────────────────────────────────────────────────────────
# AI Squad project configuration
# Generated by: ai-squad init
# Schema:       .claude/schemas/project.config.schema.json
# ──────────────────────────────────────────────────────────────────────────────

project:
  name: my-project
  repo: owner/my-project  # GitHub owner/repo — used by gh CLI and story-issue-sync
  milestone: ""           # Default milestone for new stories. Leave empty to skip.

sdlc:
  mode: standard          # standard | spike
                          # standard: full Spec-Kit → 8-phase pipeline
                          # spike:    skips Spec-Kit (time-boxed research tasks)

  require_adr_for:        # Change categories that require an ADR before proceeding
    - new_dependency
    - cross_boundary_change
    - data_model_change
    - auth_change
    - mcp_adoption
    - visual_identity_change

qa:
  bdd: cucumber           # cucumber | behave | none
  step_defs_dir: tests/step-definitions
  features_dir: tests/features

design:
  ui_library: none        # mantine | tailwind | shadcn | none
  tokens_file: docs/design/identity/tokens.json
  wireframe_format: ascii # ascii | svg | html

github:
  project_number: null    # Set by: ai-squad project bootstrap
  project_node_id: null   # Set by: ai-squad project bootstrap

dod:
  default:
    - Unit tests green
    - Integration tests green
    - Cucumber scenarios green
    - ADRs linked where required
    - Documentation updated
    - CHANGELOG entry added
  ui_additions:
    - Wireframe approved
    - Mockup approved
    - A11y audit passed (WCAG 2.2 AA)

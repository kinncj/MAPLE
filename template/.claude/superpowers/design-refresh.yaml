name: design-refresh
description: Refresh visual identity and propagate new tokens to all existing components
version: "1.0.0"

inputs:
  - name: brief
    type: string
    required: false
    default: ""
    description: New brand brief or keywords. Leave empty to refine existing palette.
  - name: scope
    type: enum
    required: false
    default: full
    enum: [full, tokens-only, mockups-only]
    description: "full: re-run all design stages. tokens-only: update tokens.json and re-emit. mockups-only: regenerate mockups from existing tokens."

stages:
  - agent: visual-identity-designer
    description: "Produce updated palette + typography from brief"
    when: "{{scope}} != mockups-only"
    inputs:
      brief: "{{brief}}"

  - gate: human-approval
    description: "Await updated palette approval before propagating"
    when: "{{scope}} != mockups-only"

  - agent: design-system-author
    description: "Re-emit CSS vars, Tailwind config, Mantine theme from updated tokens"
    when: "{{scope}} != mockups-only"

  - agent: ui-mockup-builder
    description: "Regenerate mockups for all ui:true stories using updated tokens"
    when: "{{scope}} != tokens-only"

  - gate: human-approval
    description: "Review regenerated mockups before a11y audit"
    when: "{{scope}} != tokens-only"

  - agent: a11y-auditor
    description: "Re-audit all ui:true stories for WCAG 2.2 AA with updated palette"
    when: "{{scope}} != tokens-only"

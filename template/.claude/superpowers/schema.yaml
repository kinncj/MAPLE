# Superpower Schema
# Each superpower is a named composition of skills and agents.
# Superpowers live in template/.claude/superpowers/<name>.yaml
# The TUI (squad) auto-discovers all YAML files here and binds them.

# ─── Required fields ──────────────────────────────────────────────────────────

# name: kebab-case identifier, must match filename
name: string           # required

# description: one-line summary shown in TUI superpower picker
description: string    # required

# version: semver, increment when stages change
version: string        # required, e.g. "1.0.0"

# ─── Inputs ───────────────────────────────────────────────────────────────────

# inputs: named parameters the user provides before the superpower runs
# type: string | bool | enum
# required: true | false
# default: optional default value
inputs:
  - name: string
    type: string        # string | bool | enum
    required: bool
    description: string
    default: string     # optional
    enum: []            # optional, for type: enum

# ─── Stages ───────────────────────────────────────────────────────────────────

# stages: ordered list of steps. Each step is one of:
#   - agent: <agent-name>        delegate to a named agent
#   - skill: <skill-name>        run a skill directly
#   - pipeline: standard-8-phase  run the full 8-phase pipeline
#   - gate: human-approval        halt and require human sign-off
#
# Optional per stage:
#   when: <condition-expression>  skip this stage if condition is false
#     Supported conditions:
#       identity.tokens_missing   — docs/design/identity/tokens.json absent
#       story.ui_true             — story frontmatter ui: true
#       branch.not_spike          — current branch not spike/*
#       always                    — default (always run)
#
#   inputs: map of input name → value or expression
#   description: human-readable label shown in TUI while stage runs

stages:
  - agent: string           # OR skill: string OR pipeline: string OR gate: string
    when: string            # optional condition
    description: string     # optional label
    inputs: {}              # optional key-value map
